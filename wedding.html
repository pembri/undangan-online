    <main>

    <!-- Floating WhatsApp -->

    </footer>

    
<script>
    document.getElementById('hamburger-btn').addEventListener('click', function() {
        document.getElementById('nav-menu').classList.toggle('active');
    });
</script>


    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetch('database.json')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('product-container');
                    const filter = 'wedding';
                    
                    const filteredData = filter ? data.filter(item => item.category === filter) : data;
                    
                    if(filteredData.length === 0) {
                        container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #888;">Belum ada produk untuk kategori ini.</p>';
                        return;
                    }

                    filteredData.forEach(product => {
                        const card = document.createElement('div');
                        card.className = 'product-card';
                        const categoryLabels = { wedding: "Wedding", khitanan: "Khitanan", birthday: "Birthday", reunion: "Reunion" };
                        card.innerHTML = `
                            <div class="mockup-container">
                                <img src="${product.image}" alt="${product.name}" class="mockup-img" onerror="this.src='https://via.placeholder.com/240x426/f8f8f8/111111?text=RIRA+DIGITAL'">
                            </div>
                            <span class="product-category category-${product.category}">${categoryLabels[product.category] || product.category}</span>
                            <div class="product-price">Rp ${product.price}</div>
                            <div class="product-name">${product.name}</div>
                            <div class="btn-group">
                                <a href="${product.demoUrl}" target="_blank" class="btn btn-demo">Demo</a>
                                <a href="https://wa.me/${product.whatsapp}?text=Halo%20RIRA%20DIGITAL,%20saya%20mau%20order%20undangan%20digital%20tema%20*${encodeURIComponent(product.name)}*" target="_blank" class="btn btn-order">Order</a>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    document.getElementById('product-container').innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: red;">Gagal memuat produk dari database.json.</p>';
                });
        });
    </script>
</body>
</html>
